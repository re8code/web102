<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@5.0.2/reset.min.css">
  <title>About Restaurant</title>
  <style>
    body {
      font-size: 14px;
      line-height: 23px;
      font-family: '맑은고딕', 'Arial';
      color: black;
    }

    #top {
      width: 1000px;
      height: 500px;
      margin: 30px auto 0;
    }

    #top img {
      display: block;
    }

    #top .top_left {
      width: 750px;
      height: 500px;
      float: left;
      background-image: url('/img/chef_about.png');
    }

    #top>.top_left>p {
      width: 210px;
      height: 210px;
      padding: 20px;
      margin-top: 250px;
      background-color: #386d0dc8;
    }

    #top>.top_left>p>span {
      font-size: 20px;
      font-weight: 900;
    }

    #top .top_right {
      width: 250px;
      height: 500px;
      float: left;
      background-color: cyan;
    }
  </style>
</head>

<body>
  <div id="top">
    <div class="top_left">
      <p>
        <span>GLOBAL<br>BUSINESS</span><br><br>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do eiusmod tempor incididunt ut labore et dolore
        magna aliqua.
      </p>
    </div>
    <div class="top_right">
      <img src="../img/right1.png" alt="up image" />
      <img src="../img/right2.png" alt="down image" />
    </div>
  </div>
</body>

</html>
